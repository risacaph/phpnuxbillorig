name: Build Windows Installer

# Builds RisacaPh-Billing-Setup-<version>.exe from installer/RisacaPh-Billing.iss
# on a Windows runner. On a tag push the .exe is attached to that release;
# on manual dispatch it is uploaded as a downloadable workflow artifact.

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "installer\RisacaPh-Billing.iss"'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: RisacaPh-Billing-Setup
          path: installer/Output/*.exe
          if-no-files-found: error

      - name: Attach installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/*.exe
